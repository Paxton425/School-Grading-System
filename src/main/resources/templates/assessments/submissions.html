<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::content}, ~{link}, ~{scripts})}">
<head>
    <meta charset="UTF-8">
    <title>Assessment Form</title>
    <link rel="stylesheet" th:href="@{/css/assessments.css}">
</head>
<body>
<div th:fragment="content">
    <header class="dashboard-head mb-4 d-flex justify-content-between align-items-end">
        <div>
            <h1 th:text="${assessment.title}">Term 1 Project</h1>
            <p class="mb-0 text-muted">Submissions Management for <span class="fw-bold" th:text="${assessment.subject.name}"></span></p>
        </div>
        <a th:href="@{/assessments/record/{id}(id=${assessment.id})}" class="btn btn-primary">
            <i class="bi bi-plus-lg"></i> Record New Mark
        </a>
    </header>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <small class="text-muted d-block text-uppercase fw-bold">Completion</small>
                <div class="d-flex align-items-center gap-2">
                    <h3 class="mb-0" th:text="${stats.submittedCount + '/' + stats.totalEnrolled}">15/30</h3>
                    <span class="badge bg-soft-info text-info" th:text="${stats.completionPercent + '%'}">50%</span>
                </div>
                <div class="progress mt-2" style="height: 6px;">
                    <div class="progress-bar bg-info" th:style="'width:' + stats.completionPercent + '%'"></div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <small class="text-muted d-block text-uppercase fw-bold">Class Average</small>
                <h3 class="mb-0" th:text="${#numbers.formatDecimal(stats.average, 1, 1) + ' pts'}">42.5 pts</h3>
                <small class="text-secondary" th:text="${#numbers.formatDecimal(stats.averagePercent, 1, 0) + '% of total'}">85%</small>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card p-3 border-0 shadow-sm">
                <small class="text-muted d-block text-uppercase fw-bold">Pass Rate</small>
                <h3 class="mb-0 text-success" th:text="${stats.passRate + '%'}">90%</h3>
                <small class="text-secondary" th:text="${stats.passCount + ' students passed'}">14 students</small>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 border-0">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0 fw-bold">Student Records</h5>
                <input type="text" class="form-control form-control-sm w-25" placeholder="Search student...">
            </div>
        </div>
        <div class="table-responsive">
            <table class="table align-middle custom-table mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="ps-4">Student</th>
                    <th>Grade</th>
                    <th>Term</th>
                    <th>Score</th>
                    <th>Percentage</th>
                    <th class="text-end pe-4">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="res : ${submissions}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center gap-2">
                            <div class="avatar-sm bg-primary-soft text-primary rounded-circle p-2 text-center" style="width:35px">
                                <span th:text="${#strings.substring(res.enrollment.student.firstName, 0, 1)}">T</span>
                            </div>
                            <div>
                                <div class="fw-bold" th:text="${res.enrollment.student.firstName + ' ' + res.enrollment.student.lastName}">Thabo Mokoena</div>
                                <small class="text-muted" th:text="${res.enrollment.student.gender}">MALE</small>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge bg-light text-dark border" th:text="'Grade ' + ${res.enrollment.student.grade}">Grade 10</span></td>
                    <td th:text="${res.term}">TERM_1</td>
                    <td>
                        <span class="fw-bold" th:text="${res.score}">42</span>
                        <small class="text-secondary" th:text="'/ ' + ${assessment.maxPoints}">/ 50</small>
                    </td>
                    <td>
                        <div class="fw-bold"
                             th:classappend="${(res.score * 1.0 / assessment.maxPoints) >= 0.5 ? 'text-success' : 'text-danger'}"
                             th:text="${#numbers.formatDecimal((res.score * 100.0 / assessment.maxPoints), 1, 0) + '%'}">
                            84%
                        </div>
                    </td>
                    <td class="text-end pe-4">
                        <button class="btn btn-sm btn-icon btn-light text-primary"><i class="bi bi-pencil"></i></button>
                        <button class="btn btn-sm btn-icon btn-light text-danger ms-1"><i class="bi bi-trash"></i></button>
                    </td>
                </tr>

                <tr th:if="${submissions.isEmpty()}">
                    <td colspan="6" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No marks have been recorded yet.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
