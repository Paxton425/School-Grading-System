<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Staff Directory | Grading System</title>
    <th:block th:replace="~{common/layout :: header-css}"></th:block>
</head>
<body class="bg-light">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0">Academic Staff</h2>
            <p class="text-muted">Manage educators and subject allocations</p>
        </div>
        <a th:href="@{/teachers/create}" class="btn btn-dark">+ Add Educator</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-light">
                <tr>
                    <th class="ps-4">Educator</th>
                    <th>Department</th>
                    <th>Employee ID</th>
                    <th>Load</th>
                    <th class="text-end pe-4">Manage</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(teachers)}">
                    <td colspan="5" class="text-center py-5">
                        <div class="text-muted">No teachers found in the system.</div>
                    </td>
                </tr>

                <tr th:each="teacher : ${teachers}">
                    <td class="ps-4">
                        <div class="d-flex align-items-center">
                            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center me-3"
                                 style="width: 40px; height: 40px; font-weight: bold;"
                                 th:text="${#strings.substring(teacher.firstName,0,1) + #strings.substring(teacher.lastName,0,1)}">
                                JS
                            </div>
                            <div>
                                <div class="fw-bold text-dark" th:text="${teacher.firstName + ' ' + teacher.lastName}">Mr. John Smith</div>
                                <small class="text-muted" th:text="${teacher.email}"></small>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="badge bg-secondary-subtle text-secondary border border-secondary-subtle" th:text="${teacher.getDepartment()}"></span>
                    </td>
                    <td><code th:text="${teacher.getEmployeeId()}"></code></td>
                    <td>
                        <div class="progress" style="height: 6px; width: 100px;">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 80%"></div>
                        </div>
                        <small class="text-muted">80% Capacity</small>
                    </td>
                    <td class="text-end pe-4">
                        <a th:href="@{/teachers/edit/{id}(id=${teacher.id})}" class="btn btn-sm btn-outline-dark">
                            Profile
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{common/layout :: header-scripts}"></th:block>
</body>
</html>
