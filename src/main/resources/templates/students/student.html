<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{common/layout :: layout(~{::body}, ~{::link})}">
<head>
  <title>Student Profile | Grading System</title>
  <link rel="stylesheet" th:href="@{/css/students.css}" href="../../static/css/students.css">
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 th:text="${student.firstName + ' ' + student.lastName}">Student Name</h1>
    <div>
      <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">Edit Profile</a>
      <a href="/students" class="btn btn-secondary">Back to List</a>
    </div>
  </div>

  <div class="row">
    <div class="col-md-4">
      <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">Personal Details</div>
        <div class="card-body">
          <p><strong>Gender:</strong> <span th:text="${student.gender}"></span></p>
          <p><strong>Grade:</strong> <span th:text="${student.grade}"></span></p>
          <p><strong>Birth Date:</strong> <span th:text="${student.birthDay}"></span></p>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          Enrolled Subjects
          <span class="badge bg-info" th:text="${student.enrollments.size() + ' Subjects'}">0</span>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
            <tr>
              <th>Subject Code</th>
              <th>Subject Name</th>
              <th>Teacher</th>
              <th>Current Grade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${student.enrollments}">
              <td th:text="${enrollment.subject.subjectCode}">MATH10</td>
              <td th:text="${enrollment.subject.name}">Mathematics</td>
              <td th:text="${enrollment.teacher != null ? enrollment.teacher.firstName + ' ' + enrollment.teacher.lastName : 'Not Assigned'}">Teacher</td>
              <td>
                                        <span class="fw-bold text-success"
                                              th:if="${not #lists.isEmpty(enrollment.grades)}"
                                              th:text="${enrollment.grades[0].score + '%'}"></span>
                <span class="text-muted" th:unless="${not #lists.isEmpty(enrollment.grades)}">No results</span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(student.enrollments)}">
              <td colspan="4" class="text-center py-4 text-muted">No subjects enrolled yet.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
