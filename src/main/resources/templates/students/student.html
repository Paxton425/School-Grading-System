<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::body}, ~{::link}, null)}">
<head>
  <title>Student Profile | Grading System</title>
  <link rel="stylesheet" th:href="@{/css/students.css}" href="../../static/css/students.css">
</head>
<body>
<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 th:text="${student.firstName + ' ' + student.lastName}">Student Name</h1>
    <div>
      <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">Edit Profile</a>
      <a href="/students" class="btn btn-secondary">Back to List</a>
    </div>
  </div>



    <div class="col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
          Enrolled Subjects
          <span class="badge bg-info" th:text="${student.subjectGrades.size() + ' Subjects'}">0</span>
        </div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
            <tr>
              <th>Subject Code</th>
              <th>Subject Name</th>
              <th>Teacher</th>
              <th>Current Grade</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="sg : ${student.subjectGrades}">
              <td th:text="${sg.subject.subjectCode}">MATH10</td>
              <td th:text="${sg.subject.name}">Mathematics</td>
              <td th:text="${sg.getInstructor() != null ? sg.instructor.firstName + ' ' + sg.instructor.lastName : 'Not Assigned'}">Teacher</td>
              <td>
                                        <span class="fw-bold text-success"
                                              th:if="${not #lists.isEmpty(sg.getGrades())}"
                                              th:text="${sg.grades[0].score + '%'}"></span>
                <span class="text-muted" th:unless="${not #lists.isEmpty(enrollment.grades)}">No results</span>
              </td>
            </tr>
            <tr th:if="${#lists.isEmpty(student.subjectGrades)}">
              <td colspan="4" class="text-center py-4 text-muted">No subjects enrolled yet.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
