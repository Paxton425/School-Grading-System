<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::content}, ~{::link}, ~{::script})}">
<head>
  <link rel="stylesheet" th:href="@{/css/students.css}">
</head>
<body>

<div th:fragment="content" class="container-fluid py-4">
  <div class="card report-header border-0 shadow-sm mb-4 bg-white border-start border-5 border-primary">
    <div class="card-body p-4">
      <div class="row align-items-center">
        <div class="col-md-7">
          <h2 class="fw-bold mb-1" th:text="${report.firstName + ' ' + report.lastName}">Name</h2>
          <p class="text-muted small mb-0">Academic Performance Report | 2026</p>
        </div>
        <div class="col-md-5 d-flex justify-content-around text-center border-start">
          <div>
            <small class="text-muted d-block fw-bold text-uppercase">Year Avg</small>
            <h4 class="fw-bold text-primary" th:text="${#numbers.formatDecimal(report.overallAverage, 1, 1)} + '%'"></h4>
          </div>
          <div>
            <small class="text-muted d-block fw-bold text-uppercase">Highest</small>
            <h4 class="fw-bold text-success" th:text="${report.highestMark} + '%'"></h4>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm overflow-hidden">
    <div class="table-responsive">
      <table class="table table-bordered align-middle mb-0 text-center">
        <thead class="bg-dark text-white">
          <tr>
            <th rowspan="2" class="align-middle text-start ps-4">Learning Area (Subject)</th>
            <th th:each="term : ${T(com.example.springbootmvcdemo.model.Result.Term).values()}"
              colspan="3" th:text="${term}">Term X</th>
          </tr>

          <tr class="bg-light text-muted x-small">
            <th:block th:each="i : ${#numbers.sequence(1, 4)}">
              <th>%</th>
              <th>Avg</th>
              <th>Lvl</th>
            </th:block>
          </tr>
        </thead>
        <tbody>
        <tr th:each="entry : ${report.results}">
          <td class="text-start ps-4 fw-bold text-dark" th:text="${entry.key}">Subject</td>

          <th:block th:each="term : ${T(com.example.springbootmvcdemo.model.Result.Term).values()}">
            <td th:with="res=${entry.value.get(term)}">
              <span class="subject-grade" th:text="${res != null ? res.finalGrade + '%' : '-'}"></span>
            </td>
            <td class="subject-average text-muted" th:with="res=${entry.value.get(term)}">
              <small th:text="${res != null ? res.average + '%' : '-'}"></small>
            </td>
            <td class="subject-level fw-bold text-primary" th:with="res=${entry.value.get(term)}">
              <span th:text="${res != null ? res.gradeLevel : '-'}"></span>
            </td>
          </th:block>
        </tr>
        </tbody>
        <tfoot class="bg-light fw-bold">
        <tr>
          <td class="text-start ps-4">TERM TOTALS / AVERAGES</td>
          <th:block th:each="term : ${T(com.example.springbootmvcdemo.model.Result.Term).values()}">
            <td th:text="${#numbers.formatDecimal(report.totalsPerTerm.get(term), 1, 0)}"></td>
            <td th:text="${#numbers.formatDecimal(report.averagePerTerm.get(term), 1, 1)} + '%'"></td>
            <td>-</td>
          </th:block>
        </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>  
<script>
  $(document).ready(() => {
    $('.subject-grade').each(function() {
      const val = parseFloat($(this).text());

      console.log('grade', val);

      // Ensure it's a valid number before styling
      if (!isNaN(val)) {
        if (val < 50) {
          $(this).addClass('text-danger'); // Red
        } else if (val >= 50 && val < 75) {
          $(this).addClass('text-warning'); // Yellow/Orange
        } else if (val >= 75) {
          $(this).addClass('text-success'); // Green
        }
      }
    });
  });

</script>
</body>
</html>
