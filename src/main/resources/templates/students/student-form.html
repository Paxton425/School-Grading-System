<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{common/layout :: layout(~{::body}, ~{::link}, ~{::script})}">
<head>
    <meta charset="UTF-8" />
    <title th:text="${student.id == null ? 'Enroll Student' : 'Edit Student Profile'}">Create Student Profile</title>
    <link rel="stylesheet" th:href="@{/css/students.css}" href="../../static/css/students.css">
</head>
<body class="bg-light">
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="bi bi-exclamatation-triangle-fill me-2"></i>
    <span th:text="${error}">Error message here</span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>

<div class="main-content container mt-5">

    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/students}" class="btn btn-link text-decoration-none p-0 me-3">
            <i class="bi bi-arrow-left fs-4"></i>
        </a>
        <h2 class="fw-bold mb-0" th:text="${student.id == null ? 'Enroll Student' : 'Edit Student Profile'}">Enroll Student</h2>
    </div>
    <div class="row">
        <form class="row" th:action="@{/students/save}" th:object="${student}" method="post">
            <div class="col-md-7">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Personal Information</h5>
                    </div>
                    <div class="card-body">
                        <input type="hidden" th:field="*{id}" />

                        <div class="row mb-3">

                            <div class="col">
                                <label class="form-label">First Name</label>
                                <input
                                        type="text"
                                        th:field="*{firstName}"
                                        class="form-control"
                                        placeholder="e.g. Thabo"
                                        required/>
                            </div>
                            <div class="col">
                                <label class="form-label">Last Name</label>
                                <input type="text"
                                        th:field="*{lastName}"
                                        class="form-control"
                                        placeholder="e.g. Mokoena"
                                        required/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select th:field="*{gender}" class="form-select">
                                <option
                                        th:each="g : ${genders}"
                                        th:value="${g}"
                                        th:text="${g}"
                                ></option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Date of Birth</label>
                            <input
                                    th:field="*{birthDay}"
                                    type="date"
                                    th:value="${student.birthDay != null ? #temporals.format(student.birthDay, 'yyyy-MM-dd') : ''}"
                                    class="form-control"
                                    required/>
                            <small class="text-muted">
                                Required for CAPS ID validation
                            </small>
                        </div>

                        <div class="d-grid">
                            <button
                                    class="save-student-button btn btn-primary"
                                    type="submit">
                                Save Student Profile
                            </button>
                        </div>
                        <div class="popup-backdrop" id="popupBackdrop" onclick="closePopup()">
                            <div id="popup" class="popup-container" >
                                <div class="popup-image-container">
                                    <img class="popup-image"
                                         th:src="@{/images/check-mark-filled.png}"
                                         src="../../static/images/check-mark-icon.png"
                                         alt="check mark icon">
                                </div>
                                <div class="popup-content">
                                    <h2 class="popup-status mb-2">Success</h2>
                                    <p class="mb-2" id="popupMessage" style="text-align: center;">
                                        Student data has been saved
                                    </p>
                                    <button type="button" class="popup-close-button success-button">
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card shadow-sm border-0 bg-white">
                    <div class="card-header bg-white border-bottom-0 pt-4">
                        <h5 class="fw-bold mb-0">Academic Placement</h5>
                        <p class="text-muted small">Assign the student to a specific grade and status.</p>
                    </div>
                    <div class="card-body">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Class Group</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-mortarboard"></i></span>
                                <select th:field="*{schoolClass}" class="form-select" id="classSelection" required>
                                    <option value="" selected disabled>Select a class...</option>
                                    <optgroup th:each="entry : ${classes}" th:label="|Grade ${entry.key}|">
                                        <option th:each="sc : ${entry.value}"
                                                th:value="${sc.id}"
                                                th:text="|Class ${sc.title}|">
                                            Class Title
                                        </option>
                                    </optgroup>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Enrollment Status</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="bi bi-shield-check"></i></span>
                                <select th:field="*{status}" class="form-select" id="statusSelection" required>
                                    <option value="Set status..." selected disabled>Set status...</option>
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${#strings.capitalize(#strings.toLowerCase(status))}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <div id="enrollmentSummary" class="p-4 rounded-3 border border-dashed bg-light text-center">
                            <div id="classPlaceholder">
                                <i class="bi bi-info-circle text-primary fs-4"></i>
                                <p class="mb-0 text-muted small mt-2">Complete placement to verify enrollment</p>
                            </div>

                            <div id="summaryInfo" class="d-none">
                                <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
                                    <span class="badge rounded-pill bg-primary" id="detailGrade">Grade</span>
                                    <span class="badge rounded-pill bg-secondary" id="detailStatus">Status</span>
                                </div>
                                <h5 class="fw-bold text-dark mb-0" id="detailTitle">Class Name</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
</body>
<script>
    $(document).ready(function() {
        function updateSummary() {
            const classOpt = $('#classSelection').find('option:selected');
            const statusVal = $('#statusSelection').val();

            const classTitle = classOpt.val() ? classOpt.text() : null;
            const gradeLabel = classOpt.closest('optgroup').attr('label');

            if (classTitle || statusVal) {
                $('#classPlaceholder').addClass('d-none');
                $('#summaryInfo').removeClass('d-none');

                if (classTitle) {
                    $('#detailGrade').text(gradeLabel).removeClass('d-none');
                    $('#detailTitle').text(classTitle);
                }

                if (statusVal) {
                    const statusBadge = $('#detailStatus');
                    statusBadge.text(statusVal).removeClass('d-none');

                    // Professional color coding
                    statusBadge.removeClass('bg-success bg-warning bg-danger bg-secondary');
                    if (statusVal === 'ACTIVE') statusBadge.addClass('bg-success');
                    else if (statusVal === 'PENDING') statusBadge.addClass('bg-warning text-dark');
                    else statusBadge.addClass('bg-secondary');
                }
            }
        }

        $('#classSelection, #statusSelection').on('change', updateSummary);
    });
</script>
</html>
